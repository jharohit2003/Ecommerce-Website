name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-env:
    name: Validate Environment Variables
    runs-on: ubuntu-latest
    steps:
      - name: Check Environment Variables
        run: |
          # Check if required secrets exist
          if [ -z "${{ secrets.MONGODB_URI }}" ]; then
            echo "❌ MONGODB_URI secret is missing"
            exit 1
          fi
          
          # Validate MongoDB URI format
          if [[ ! "${{ secrets.MONGODB_URI }}" =~ ^mongodb\+srv:// ]]; then
            echo "❌ MONGODB_URI must start with mongodb+srv://"
            exit 1
          fi
          
          echo "✅ Environment validation passed"

  test:
    name: Test Application
    runs-on: ubuntu-latest
    needs: validate-env
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Test Backend
      working-directory: ./Backend
      run: |
        npm ci
        # Create test .env file
        echo "PORT=4000" > .env
        echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
        echo "CLOUDINARY_NAME=${{ secrets.CLOUDINARY_NAME }}" >> .env
        echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
        echo "CLOUDINARY_SECRET_KEY=${{ secrets.CLOUDINARY_SECRET_KEY }}" >> .env
        echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
        echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
        
        # Check if server starts (timeout after 10 seconds)
        timeout 10s npm start || [ $? -eq 124 ] && echo "✅ Server started successfully"
    
    - name: Build Client
      working-directory: ./vite-project
      run: |
        npm ci
        # Create .env for build
        echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env
        npm run build
    
    - name: Build Admin
      working-directory: ./admin
      run: |
        npm ci
        echo "VITE_API_URL=${{ secrets.VITE_ADMIN_API_URL }}" > .env
        npm run build

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./Backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}
        build-args: |
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CLOUDINARY_NAME=${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_SECRET_KEY=${{ secrets.CLOUDINARY_SECRET_KEY }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build Client Image
      uses: docker/build-push-action@v4
      with:
        context: ./vite-project
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-client:latest
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-client:${{ github.sha }}
        build-args: |
          VITE_API_URL=${{ secrets.VITE_API_URL }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build Admin Image
      uses: docker/build-push-action@v4
      with:
        context: ./admin
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-admin:latest
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-admin:${{ github.sha }}
        build-args: |
          VITE_API_URL=${{ secrets.VITE_ADMIN_API_URL }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        script: |
          cd /opt/ecommerce
          
          # Pull latest images
          docker-compose pull
          
          # Stop and remove old containers
          docker-compose down
          
          # Start new containers with updated environment
          docker-compose up -d
          
          # Wait for services to start
          sleep 10
          
          # Check if services are running
          docker-compose ps
          
          # Clean up unused images
          docker image prune -f
          
          # Check backend health
          curl -f http://localhost:4000/health || echo "⚠️ Backend health check failed"
